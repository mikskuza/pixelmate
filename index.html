<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halftone Mosaic Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Geist & Geist Mono fonts from Google Fonts (Weight 400 & 700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Geist:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #D6D1C7;
            color: #000000;
            font-family: 'Geist Mono', monospace;
            font-weight: 400;
        }
        
        /* Font rule exclusively for the main title */
        .font-geist-title {
            font-family: 'Geist', sans-serif;
            font-weight: 700;
        }
        
        /* Styling standard inputs to match the monochrome look */
        input[type=range] {
            accent-color: #000000;
        }
        input[type=checkbox] {
            accent-color: #000000;
        }
        
        /* Minimal color picker styling */
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 0.25rem;
        }
    </style>
</head>
<body class="min-h-screen flex justify-center py-10 px-4 md:px-8 lg:px-12">

    <!-- 2-Column Layout Container -->
    <div class="max-w-[1400px] w-full flex flex-col lg:flex-row gap-10 xl:gap-16 lg:items-stretch">
        
        <!-- LEFT PANEL (Controls) -->
        <div class="w-full lg:w-72 xl:w-80 flex-shrink-0 flex flex-col gap-5">
            
            <!-- Header -->
            <div class="mb-4">
                <h1 class="text-2xl mb-1 font-geist-title tracking-tight">Mosaic Generator</h1>
                <p class="text-xs opacity-70">Converts an image into a variable-size halftone mosaic.</p>
            </div>

            <!-- File Upload -->
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-gray-800">Select an image:</label>
                <input type="file" id="imageUpload" accept="image/*" 
                       class="block w-full text-xs text-black
                              file:mr-3 file:py-2 file:px-3
                              file:rounded file:border-0
                              file:text-xs file:font-bold
                              file:bg-white file:text-black
                              hover:file:bg-gray-100 cursor-pointer transition-colors"/>
            </div>

            <!-- Dot Spacing -->
            <div class="flex flex-col gap-1.5">
                <label for="dotSize" class="text-xs flex justify-between items-center text-gray-800">
                    <span>Dot Spacing (Grid):</span>
                    <span id="dotSizeVal" class="bg-white px-2 py-0.5 rounded text-xs shadow-sm">12px</span>
                </label>
                <input type="range" id="dotSize" min="4" max="40" value="12" class="w-full h-1.5 bg-black/20 rounded-lg cursor-pointer">
            </div>

            <!-- Size Multiplier -->
            <div class="flex flex-col gap-1.5">
                <label for="dotScale" class="text-xs flex justify-between items-center text-gray-800">
                    <span>Size Multiplier:</span>
                    <span id="dotScaleVal" class="bg-white px-2 py-0.5 rounded text-xs shadow-sm">1.2</span>
                </label>
                <input type="range" id="dotScale" min="0.1" max="2.0" step="0.1" value="1.2" class="w-full h-1.5 bg-black/20 rounded-lg cursor-pointer">
            </div>

            <!-- Raster Color -->
            <div class="flex flex-col gap-1.5">
                <label for="colorInput" class="text-xs text-gray-800">Raster Color (HEX):</label>
                <div class="flex items-center gap-2">
                    <input type="color" id="colorPicker" value="#FFFFFF" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0 p-0">
                    <input type="text" id="colorInput" value="#FFFFFF" class="bg-white text-black text-sm rounded px-3 py-1.5 w-full focus:outline-none focus:ring-1 focus:ring-black shadow-sm">
                </div>
            </div>

            <!-- Background Color (NEW) -->
            <div class="flex flex-col gap-1.5">
                <label for="bgColorInput" class="text-xs text-gray-800">Background Color (HEX):</label>
                <div class="flex items-center gap-2">
                    <input type="color" id="bgColorPicker" value="#000000" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0 p-0">
                    <input type="text" id="bgColorInput" value="#000000" class="bg-white text-black text-sm rounded px-3 py-1.5 w-full focus:outline-none focus:ring-1 focus:ring-black shadow-sm">
                </div>
            </div>

            <!-- Raster Shape -->
            <div class="flex flex-col gap-1.5">
                <label for="shapeSelect" class="text-xs text-gray-800">Raster Shape:</label>
                <select id="shapeSelect" class="bg-white text-black text-sm rounded px-3 py-2 w-full focus:outline-none focus:ring-1 focus:ring-black cursor-pointer shadow-sm border-0">
                    <option value="circle">Circle</option>
                    <option value="square">Square</option>
                </select>
            </div>

            <!-- Toggles -->
            <div class="flex flex-col gap-3 mt-2">
                <label class="flex items-center cursor-pointer gap-2.5 text-xs hover:opacity-70 transition-opacity">
                    <input type="checkbox" id="shadingToggle" checked class="w-4 h-4 cursor-pointer rounded border-gray-400">
                    <span>Simulate Shading</span>
                </label>
                <label class="flex items-center cursor-pointer gap-2.5 text-xs hover:opacity-70 transition-opacity" title="Useful for black logos on transparent backgrounds">
                    <input type="checkbox" id="invertToggle" class="w-4 h-4 cursor-pointer rounded border-gray-400">
                    <span>Invert Brightness</span>
                </label>
            </div>

            <!-- Warning / Status Message -->
            <div id="statusMessage" class="hidden mt-2 p-3 rounded bg-white text-xs text-center shadow-sm">
                Processing image...
            </div>

            <!-- Downloads -->
            <div class="mt-4 flex flex-col gap-3">
                <button id="downloadPngBtn" class="bg-white hover:bg-gray-50 text-black text-sm font-bold py-2.5 px-4 rounded shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Download PNG
                </button>
                <button id="downloadSvgBtn" class="bg-black hover:bg-gray-800 text-white text-sm font-bold py-2.5 px-4 rounded shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Download SVG
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL (Canvas Output) -->
        <div class="flex-grow flex flex-col relative min-h-[60vh] lg:min-h-[calc(100vh-5rem)]">
            <!-- Dynamic Background Container -->
            <div id="canvasWrapper" class="w-full flex-grow flex items-center justify-center rounded-lg overflow-hidden relative shadow-md transition-colors duration-300" style="background-color: #000000;">
                <canvas id="outputCanvas" class="max-w-full h-auto object-contain" style="max-height: 100%;"></canvas>
                
                <div id="placeholder" class="absolute inset-0 flex items-center justify-center flex-col text-gray-500 pointer-events-none mix-blend-difference">
                    <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-sm font-bold tracking-wide">Upload an image to see the effect</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        
        // Input Elements
        const imageUpload = document.getElementById('imageUpload');
        const dotSizeInput = document.getElementById('dotSize');
        const dotScaleInput = document.getElementById('dotScale');
        const dotSizeVal = document.getElementById('dotSizeVal');
        const dotScaleVal = document.getElementById('dotScaleVal');
        const shadingToggle = document.getElementById('shadingToggle');
        const invertToggle = document.getElementById('invertToggle');
        const shapeSelect = document.getElementById('shapeSelect');
        
        // Color Elements
        const colorPicker = document.getElementById('colorPicker');
        const colorInput = document.getElementById('colorInput');
        const bgColorPicker = document.getElementById('bgColorPicker');
        const bgColorInput = document.getElementById('bgColorInput');
        
        // Buttons & UI
        const downloadPngBtn = document.getElementById('downloadPngBtn');
        const downloadSvgBtn = document.getElementById('downloadSvgBtn');
        const placeholder = document.getElementById('placeholder');
        const statusMessage = document.getElementById('statusMessage');

        let currentImage = null;
        let isProcessing = false;
        
        // Data for SVG generation
        let generatedShapes = [];
        let currentCanvasWidth = 0;
        let currentCanvasHeight = 0;

        // Configuration limits
        const MAX_IMAGE_WIDTH = 1400;

        // Initialization: Attempt to load default image
        window.onload = () => {
            const defaultImg = new Image();
            defaultImg.crossOrigin = "Anonymous";
            defaultImg.onload = () => {
                currentImage = defaultImg;
                renderHalftone();
            };
            defaultImg.onerror = () => {
                console.log("Waiting for manual image upload.");
            };
            defaultImg.src = "image_36f2ff.png"; 
        };

        // Handle manual file upload
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    renderHalftone();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Sliders events
        dotSizeInput.addEventListener('input', (e) => {
            dotSizeVal.textContent = `${e.target.value}px`;
        });
        
        dotScaleInput.addEventListener('input', (e) => {
            dotScaleVal.textContent = e.target.value;
        });

        // Debounce render to improve UI performance during slider drag
        let debounceTimer;
        const triggerRender = () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if(currentImage) renderHalftone();
            }, 100);
        };

        dotSizeInput.addEventListener('change', triggerRender);
        dotScaleInput.addEventListener('change', triggerRender);
        shadingToggle.addEventListener('change', triggerRender);
        invertToggle.addEventListener('change', triggerRender);

        // --- RASTER COLOR EVENTS ---
        colorPicker.addEventListener('input', (e) => {
            colorInput.value = e.target.value.toUpperCase();
            triggerRender();
        });
        
        colorInput.addEventListener('change', (e) => {
            let val = e.target.value;
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9A-F]{6}$/i.test(val)) {
                colorPicker.value = val;
                triggerRender();
            } else {
                colorInput.value = colorPicker.value.toUpperCase();
            }
        });

        // --- BACKGROUND COLOR EVENTS ---
        bgColorPicker.addEventListener('input', (e) => {
            bgColorInput.value = e.target.value.toUpperCase();
            canvasWrapper.style.backgroundColor = bgColorInput.value;
            triggerRender();
        });
        
        bgColorInput.addEventListener('change', (e) => {
            let val = e.target.value;
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9A-F]{6}$/i.test(val)) {
                bgColorPicker.value = val;
                canvasWrapper.style.backgroundColor = val;
                triggerRender();
            } else {
                bgColorInput.value = bgColorPicker.value.toUpperCase();
            }
        });

        // Shape select event
        shapeSelect.addEventListener('change', triggerRender);

        // Handle PNG Download
        downloadPngBtn.addEventListener('click', () => {
            if (!currentImage) return;
            const link = document.createElement('a');
            link.download = 'mosaic_halftone.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Handle SVG Download
        downloadSvgBtn.addEventListener('click', () => {
            if (!currentImage || generatedShapes.length === 0) return;
            
            const currentBgColor = bgColorInput.value;
            const currentColor = colorInput.value;

            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${currentCanvasWidth} ${currentCanvasHeight}" width="${currentCanvasWidth}" height="${currentCanvasHeight}">\n`;
            
            // Background
            svgContent += `  <rect width="100%" height="100%" fill="${currentBgColor}" />\n`;
            
            // Shapes
            for (const shape of generatedShapes) {
                if (shape.type === 'circle') {
                    svgContent += `  <circle cx="${shape.cx.toFixed(2)}" cy="${shape.cy.toFixed(2)}" r="${shape.r.toFixed(2)}" fill="${currentColor}" />\n`;
                } else if (shape.type === 'square') {
                    const x = (shape.cx - shape.r).toFixed(2);
                    const y = (shape.cy - shape.r).toFixed(2);
                    const size = (shape.size).toFixed(2);
                    svgContent += `  <rect x="${x}" y="${y}" width="${size}" height="${size}" fill="${currentColor}" />\n`;
                }
            }
            svgContent += `</svg>`;

            const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'mosaic_vector.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        function showStatus(text) {
            statusMessage.textContent = text;
            statusMessage.classList.remove('hidden');
        }

        function hideStatus() {
            statusMessage.classList.add('hidden');
        }

        // Main rendering engine
        function renderHalftone() {
            if (!currentImage || isProcessing) return;
            isProcessing = true;
            placeholder.classList.add('hidden');
            downloadPngBtn.disabled = true;
            downloadSvgBtn.disabled = true;
            showStatus("Processing pixels, please wait...");

            // Small timeout to allow browser to render the status message
            setTimeout(() => {
                const dotSize = parseInt(dotSizeInput.value);
                const dotScale = parseFloat(dotScaleInput.value);
                const currentColor = colorInput.value;
                const currentBgColor = bgColorInput.value;
                const currentShape = shapeSelect.value;
                
                // Clear previous shapes for SVG
                generatedShapes = [];

                // Scale down huge images to prevent browser freezing
                let width = currentImage.width;
                let height = currentImage.height;

                if (width > MAX_IMAGE_WIDTH) {
                    const ratio = MAX_IMAGE_WIDTH / width;
                    width = MAX_IMAGE_WIDTH;
                    height = height * ratio;
                }

                // Prepare output canvas
                canvas.width = width;
                canvas.height = height;
                currentCanvasWidth = width;
                currentCanvasHeight = height;

                // Fill background
                ctx.fillStyle = currentBgColor;
                ctx.fillRect(0, 0, width, height);

                // Offscreen canvas for reading original pixels
                const offCanvas = document.createElement('canvas');
                offCanvas.width = width;
                offCanvas.height = height;
                const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
                
                offCtx.drawImage(currentImage, 0, 0, width, height);
                const imageData = offCtx.getImageData(0, 0, width, height).data;

                ctx.fillStyle = currentColor;

                // Iterate through the grid
                for (let y = 0; y < height; y += dotSize) {
                    for (let x = 0; x < width; x += dotSize) {
                        
                        let r = 0, g = 0, b = 0, a = 0;
                        let count = 0;

                        // Calculate average color for the dotSize x dotSize block
                        for (let cy = 0; cy < dotSize; cy++) {
                            for (let cx = 0; cx < dotSize; cx++) {
                                const py = y + cy;
                                const px = x + cx;
                                
                                if (py < height && px < width) {
                                    const index = (py * width + px) * 4;
                                    r += imageData[index];
                                    g += imageData[index + 1];
                                    b += imageData[index + 2];
                                    a += imageData[index + 3];
                                    count++;
                                }
                            }
                        }

                        if (count === 0) continue;

                        const avgA = a / count;
                        if (avgA < 10) continue; // Ignore highly transparent areas

                        const avgR = r / count;
                        const avgG = g / count;
                        const avgB = b / count;

                        // Calculate luminance (brightness)
                        const brightness = (0.299 * avgR) + (0.587 * avgG) + (0.114 * avgB);
                        let normalizedBrightness = brightness / 255;
                        
                        // Invert brightness if the user toggled the option
                        if (invertToggle.checked) {
                            normalizedBrightness = 1.0 - normalizedBrightness;
                        }
                        
                        const maxRadius = (dotSize / 2) * dotScale;
                        const useShading = shadingToggle.checked;

                        if (useShading) {
                            const radius = maxRadius * normalizedBrightness;

                            // Optimization: skip drawing near-invisible shapes
                            if (radius > 0.5) {
                                const cx = x + dotSize / 2;
                                const cy = y + dotSize / 2;
                                ctx.beginPath();
                                if (currentShape === 'circle') {
                                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                                } else {
                                    ctx.rect(cx - radius, cy - radius, radius * 2, radius * 2);
                                }
                                ctx.fill();
                                generatedShapes.push({ type: currentShape, cx: cx, cy: cy, r: radius, size: radius * 2 });
                            }
                        } else {
                            // Dithering application (4x4 Bayer Matrix) for constant size shapes
                            const bayerMatrix = [
                                [ 0,  8,  2, 10],
                                [12,  4, 14,  6],
                                [ 3, 11,  1,  9],
                                [15,  7, 13,  5]
                            ];
                            
                            const gridX = Math.floor(x / dotSize);
                            const gridY = Math.floor(y / dotSize);
                            const bayerThreshold = (bayerMatrix[gridY % 4][gridX % 4] + 0.5) / 16;

                            if (normalizedBrightness > bayerThreshold) {
                                const cx = x + dotSize / 2;
                                const cy = y + dotSize / 2;
                                ctx.beginPath();
                                if (currentShape === 'circle') {
                                    ctx.arc(cx, cy, maxRadius, 0, Math.PI * 2);
                                } else {
                                    ctx.rect(cx - maxRadius, cy - maxRadius, maxRadius * 2, maxRadius * 2);
                                }
                                ctx.fill();
                                generatedShapes.push({ type: currentShape, cx: cx, cy: cy, r: maxRadius, size: maxRadius * 2 });
                            }
                        }
                    }
                }

                hideStatus();
                downloadPngBtn.disabled = false;
                downloadSvgBtn.disabled = false;
                isProcessing = false;
            }, 50);
        }
    </script>
</body>
</html>
